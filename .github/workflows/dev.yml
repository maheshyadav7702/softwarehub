name: Deploy to AWS ECR and Run Container

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build, Push, and Run Docker Container
    runs-on: self-hosted

    env:
      CONTAINER_NAME: mahesh-it-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Set image tag
        id: vars
        run: echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          IMAGE=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${TAG}
          echo "Building image: $IMAGE"
          docker build -t "$IMAGE" .

      - name: Push Docker image to ECR
        run: |
          IMAGE=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${TAG}
          echo "Pushing image: $IMAGE"
          docker push "$IMAGE"

      - name: Stop and remove old container if running
        run: |
          if [ "$(docker ps -q -f name=${CONTAINER_NAME})" ]; then
            echo "Stopping old container..."
            docker stop ${CONTAINER_NAME} || true
            docker rm ${CONTAINER_NAME} || true
          fi

      - name: Remove old image (optional)
        run: |
          IMAGE=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${TAG}
          docker rmi "$IMAGE" || true

      - name: Run new Docker container
        run: |
          IMAGE=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${TAG}
          echo "Running new container from image: $IMAGE"
          docker run -d \
            --name ${CONTAINER_NAME} \
            -p 80:3000 \
            --restart unless-stopped \
            "$IMAGE"
