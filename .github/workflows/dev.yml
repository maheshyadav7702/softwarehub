name: Deploy to AWS ECR and push Docker image

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ["self-hosted", "mahesh-it-app"]
    defaults:
      run:
        shell: bash

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}          # e.g. 123456789012.dkr.ecr.<region>.amazonaws.com
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}      # e.g. my-repo
      CONTAINER_NAME: mahesh-it-app
      IMAGE_TAG: ${{ github.run_number }}                # unique-ish tag per workflow run

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          set -euo pipefail
          if ! aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" --region "${AWS_REGION}" > /dev/null 2>&1; then
            aws ecr create-repository --repository-name "${ECR_REPOSITORY}" --region "${AWS_REGION}"
          fi

      - name: Login to Amazon ECR (docker)
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and tag Docker images
        run: |
          set -euo pipefail
          FULL_IMAGE_LATEST="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          FULL_IMAGE_TAG="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          # build both tags
          docker build -t "${FULL_IMAGE_LATEST}" -t "${FULL_IMAGE_TAG}" .

      - name: Push images to ECR
        run: |
          set -euo pipefail
          FULL_IMAGE_LATEST="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          FULL_IMAGE_TAG="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          docker push "${FULL_IMAGE_TAG}"
          docker push "${FULL_IMAGE_LATEST}"

      - name: Deploy container (stop/remove, pull, run)
        run: |
          set -euo pipefail
          FULL_IMAGE_TAG="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          # Stop and remove existing container if present
          if docker ps -a --format '{{.Names}}' | grep -q "^${CONTAINER_NAME}$"; then
            docker stop "${CONTAINER_NAME}" || true
            docker rm "${CONTAINER_NAME}" || true
          fi

          # Pull and run the new image
          docker pull "${FULL_IMAGE_TAG}"
          docker run -d --name "${CONTAINER_NAME}" -p 80:80 --restart unless-stopped "${FULL_IMAGE_TAG}"