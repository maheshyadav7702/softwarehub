name: Deploy to AWS ECR and run Docker image

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-ecr-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  push-to-ecr:
    runs-on: self-hosted

    env:
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      IMAGE_NAME: ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}
      CONTAINER_NAME: mahesh-it-app
      CONTAINER_PORT: 80
      HOST_PORT: 3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag and metadata
        id: vars
        run: |
          TAG=$(git rev-parse --short HEAD)
          echo "IMAGE_TAG=${TAG}" >> $GITHUB_ENV
          echo "IMAGE_REF=${IMAGE_NAME}:${TAG}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build --pull -t "${IMAGE_REF}" .

      - name: Push Docker image to ECR
        run: |
          docker push "${IMAGE_REF}"

      - name: Stop and remove existing container (if running)
        run: |
          if docker ps -a --format '{{.Names}}' | grep -q "^${CONTAINER_NAME}$"; then
            docker rm -f "${CONTAINER_NAME}"
          fi || true

      - name: Remove local image (optional cleanup)
        run: |
          docker rmi "${IMAGE_REF}" || true

      - name: Run latest Docker image
        run: |
          docker run -d \
            --name "${CONTAINER_NAME}" \
            --restart unless-stopped \
            -p ${HOST_PORT}:${CONTAINER_PORT} \
            "${IMAGE_REF}"
