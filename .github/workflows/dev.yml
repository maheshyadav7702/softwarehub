name: Deploy to AWS ECR and run Docker image
on:
  push:
    branches:
      - main

concurrency:
  group: deploy-ecr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  push-to-ecr:
    runs-on: self-hosted
    env:
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: vars
        run: |
          # use short sha + timestamp to avoid collisions and improve traceability
          sha=$(git rev-parse --short HEAD 2>/dev/null || echo unknown)
          echo "tag=${sha}-$(date -u +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.tag }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:cache
          cache-to: type=inline

      - name: Stop & remove existing container (if running)
        run: |
          docker rm -f mahesh-it-app || true

      - name: Remove old image (optional)
        run: |
          docker rmi ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.tag }} || true

      - name: Run latest Docker image
        run: |
          docker run -d --name mahesh-it-app -p 80:3000 ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.tag }}
